services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: megadoc
      POSTGRES_USER: megadoc
      POSTGRES_PASSWORD: megadoc
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U megadoc -d megadoc"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - megadoc-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - megadoc-net

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - megadoc-net

  mc-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env
    environment:
      S3_ENDPOINT_URL: http://minio:9000
    volumes:
      - ./infra/init/create-buckets.sh:/create-buckets.sh:ro
    entrypoint: ["/bin/sh", "/create-buckets.sh"]
    restart: "no"
    networks:
      - megadoc-net

  migrate:
    build:
      context: .
      dockerfile: infra/compose/Dockerfile.app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    restart: "no"
    networks:
      - megadoc-net

  api:
    build:
      context: .
      dockerfile: infra/compose/Dockerfile.app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/packages/common/src:/app/services/api/src:/app/services/worker/src:/app/services/cli/src:/app/services/knowledge_classifier/src:/app/services/knowledge_worker/src:/app/services/specialist_worker/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      mc-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    command:
      [
        "uvicorn",
        "api.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8080"
      ]
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      megadoc-net:
      ml-infra-net:
        ipv4_address: 10.89.0.51

  worker:
    build:
      context: .
      dockerfile: infra/compose/Dockerfile.app
      args:
        INSTALL_PADDLE_OCR: ${WORKER_INSTALL_PADDLE_OCR:-false}
    restart: unless-stopped
    gpus: all
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DATABASE_URL: postgresql+psycopg://megadoc:megadoc@postgres:5432/megadoc
      S3_ENDPOINT_URL: http://minio:9000
      OCR_DOTS_NATIVE_ENDPOINT: ${OCR_WORKER_DOTS_NATIVE_ENDPOINT:-http://10.89.0.3:8080/v1}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      mc-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    command:
      [
        "celery",
        "-A",
        "worker.celery_app:celery_app",
        "worker",
        "--loglevel=INFO",
        "-Q",
        "${INGESTION_QUEUE_DEFAULT:-ingestion}"
      ]
    networks:
      megadoc-net:
      ml-infra-net:
        ipv4_address: 10.89.0.52

  worker_llm_vision:
    build:
      context: .
      dockerfile: infra/compose/Dockerfile.app
      args:
        INSTALL_PADDLE_OCR: ${WORKER_INSTALL_PADDLE_OCR:-false}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DATABASE_URL: postgresql+psycopg://megadoc:megadoc@postgres:5432/megadoc
      S3_ENDPOINT_URL: http://minio:9000
      OCR_BACKEND: llm_vision
      OCR_DOTS_NATIVE_ENDPOINT: ${OCR_WORKER_DOTS_NATIVE_ENDPOINT:-http://10.89.0.3:8080/v1}
      OCR_LLM_VISION_MODEL: ${OCR_LLM_VISION_MODEL:-devstral2}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      mc-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    command:
      [
        "celery",
        "-A",
        "worker.celery_app:celery_app",
        "worker",
        "--loglevel=INFO",
        "--concurrency=${INGESTION_LLM_VISION_CONCURRENCY:-1}",
        "-Q",
        "${INGESTION_QUEUE_LLM_VISION:-ingestion_llm_vision}"
      ]
    networks:
      megadoc-net:
      ml-infra-net:
        ipv4_address: 10.89.0.53

  knowledge_worker:
    build:
      context: .
      dockerfile: infra/compose/Dockerfile.app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DATABASE_URL: postgresql+psycopg://megadoc:megadoc@postgres:5432/megadoc
      KN_LLM_ENDPOINT: ${KN_WORKER_LLM_ENDPOINT:-http://10.89.0.3:8080/v1}
      PYTHONPATH: /app/packages/common/src:/app/services/api/src:/app/services/worker/src:/app/services/cli/src:/app/services/knowledge_classifier/src:/app/services/knowledge_worker/src:/app/services/specialist_worker/src
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command:
      [
        "celery",
        "-A",
        "knowledge_worker.celery_app:celery_app",
        "worker",
        "--loglevel=INFO",
        "--concurrency=${KNOWLEDGE_WORKER_CONCURRENCY:-1}",
        "-Q",
        "knowledge"
      ]
    networks:
      megadoc-net:
      ml-infra-net:
        ipv4_address: 10.89.0.54

  specialist_utility_worker:
    build:
      context: .
      dockerfile: infra/compose/Dockerfile.app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DATABASE_URL: postgresql+psycopg://megadoc:megadoc@postgres:5432/megadoc
      PYTHONPATH: /app/packages/common/src:/app/services/api/src:/app/services/worker/src:/app/services/cli/src:/app/services/knowledge_classifier/src:/app/services/knowledge_worker/src:/app/services/specialist_worker/src
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command:
      [
        "celery",
        "-A",
        "specialist_worker.celery_app:celery_app",
        "worker",
        "--loglevel=INFO",
        "--concurrency=${SPECIALIST_UTILITY_WORKER_CONCURRENCY:-1}",
        "-Q",
        "${SPECIALIST_QUEUE_UTILITY:-specialist_utility}"
      ]
    networks:
      - megadoc-net

  specialist_accounting_worker:
    build:
      context: .
      dockerfile: infra/compose/Dockerfile.app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DATABASE_URL: postgresql+psycopg://megadoc:megadoc@postgres:5432/megadoc
      PYTHONPATH: /app/packages/common/src:/app/services/api/src:/app/services/worker/src:/app/services/cli/src:/app/services/knowledge_classifier/src:/app/services/knowledge_worker/src:/app/services/specialist_worker/src
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command:
      [
        "celery",
        "-A",
        "specialist_worker.celery_app:celery_app",
        "worker",
        "--loglevel=INFO",
        "--concurrency=${SPECIALIST_ACCOUNTING_WORKER_CONCURRENCY:-1}",
        "-Q",
        "${SPECIALIST_QUEUE_ACCOUNTING:-specialist_accounting}"
      ]
    networks:
      megadoc-net:
      ml-infra-net:
        ipv4_address: 10.89.0.55

  cli:
    build:
      context: .
      dockerfile: infra/compose/Dockerfile.app
    profiles: ["tools"]
    env_file:
      - .env
    entrypoint: ["python", "-m", "cli.main"]
    networks:
      - megadoc-net

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - megadoc-net

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  megadoc-net:
    name: megadoc-net
    internal: true
  ml-infra-net:
    name: ml-infra-net
    external: true

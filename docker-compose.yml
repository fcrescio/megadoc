services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: megadoc
      POSTGRES_USER: megadoc
      POSTGRES_PASSWORD: megadoc
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U megadoc -d megadoc"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  mc-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env
    environment:
      S3_ENDPOINT_URL: http://minio:9000
    volumes:
      - ./infra/init/create-buckets.sh:/create-buckets.sh:ro
    entrypoint: ["/bin/sh", "/create-buckets.sh"]
    restart: "no"

  migrate:
    build:
      context: .
      dockerfile: infra/compose/Dockerfile.app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: infra/compose/Dockerfile.app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/packages/common/src:/app/services/api/src:/app/services/worker/src:/app/services/cli/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      mc-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    command:
      [
        "uvicorn",
        "api.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8080"
      ]
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: infra/compose/Dockerfile.app
    user: "0:0"
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      mc-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    command:
      [
        "celery",
        "-A",
        "worker.celery_app:celery_app",
        "worker",
        "--loglevel=INFO",
        "-Q",
        "ingestion"
      ]

  cli:
    build:
      context: .
      dockerfile: infra/compose/Dockerfile.app
    profiles: ["tools"]
    env_file:
      - .env
    entrypoint: ["python", "-m", "cli.main"]

volumes:
  postgres-data:
  redis-data:
  minio-data:

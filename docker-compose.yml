services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: megadoc
      POSTGRES_USER: megadoc
      POSTGRES_PASSWORD: megadoc
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U megadoc -d megadoc"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  mc-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env
    environment:
      S3_ENDPOINT_URL: http://minio:9000
    volumes:
      - ./infra/init/create-buckets.sh:/create-buckets.sh:ro
    entrypoint: ["/bin/sh", "/create-buckets.sh"]
    restart: "no"

  migrate:
    build:
      context: .
      dockerfile: infra/compose/Dockerfile.app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: infra/compose/Dockerfile.app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/packages/common/src:/app/services/api/src:/app/services/worker/src:/app/services/cli/src:/app/services/knowledge_classifier/src:/app/services/knowledge_worker/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      mc-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    command:
      [
        "uvicorn",
        "api.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8080"
      ]
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: infra/compose/Dockerfile.app
      args:
        INSTALL_PADDLE_OCR: ${WORKER_INSTALL_PADDLE_OCR:-false}
    restart: unless-stopped
    gpus: all
    env_file:
      - .env
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      mc-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    command:
      [
        "celery",
        "-A",
        "worker.celery_app:celery_app",
        "worker",
        "--loglevel=INFO",
        "-Q",
        "${INGESTION_QUEUE_DEFAULT:-ingestion}"
      ]

  worker_llm_vision:
    build:
      context: .
      dockerfile: infra/compose/Dockerfile.app
      args:
        INSTALL_PADDLE_OCR: ${WORKER_INSTALL_PADDLE_OCR:-false}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://127.0.0.1:6379/1
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/2
      DATABASE_URL: postgresql+psycopg://megadoc:megadoc@127.0.0.1:5432/megadoc
      S3_ENDPOINT_URL: http://127.0.0.1:9000
      OCR_BACKEND: llm_vision
      OCR_LLM_VISION_MODEL: ${OCR_LLM_VISION_MODEL:-devstral2}
    network_mode: host
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      mc-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    command:
      [
        "celery",
        "-A",
        "worker.celery_app:celery_app",
        "worker",
        "--loglevel=INFO",
        "--concurrency=${INGESTION_LLM_VISION_CONCURRENCY:-1}",
        "-Q",
        "${INGESTION_QUEUE_LLM_VISION:-ingestion_llm_vision}"
      ]

  knowledge_worker:
    build:
      context: .
      dockerfile: infra/compose/Dockerfile.app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://127.0.0.1:6379/1
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/2
      DATABASE_URL: postgresql+psycopg://megadoc:megadoc@127.0.0.1:5432/megadoc
      PYTHONPATH: /app/packages/common/src:/app/services/api/src:/app/services/worker/src:/app/services/cli/src:/app/services/knowledge_classifier/src:/app/services/knowledge_worker/src
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    network_mode: host
    command:
      [
        "celery",
        "-A",
        "knowledge_worker.celery_app:celery_app",
        "worker",
        "--loglevel=INFO",
        "--concurrency=${KNOWLEDGE_WORKER_CONCURRENCY:-1}",
        "-Q",
        "knowledge"
      ]

  cli:
    build:
      context: .
      dockerfile: infra/compose/Dockerfile.app
    profiles: ["tools"]
    env_file:
      - .env
    entrypoint: ["python", "-m", "cli.main"]

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  redis-data:
  minio-data:
